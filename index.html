<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FaOnSa Taxi Quiz">
<meta name="theme-color" content="#0D1117">
<title>FaOnSa Taxi & Mietwagenverkehr</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#C9A84C;--gold-l:#E8C97A;
  --dark:#0D1117;--dark2:#161B22;--dark3:#1E2530;
  --border:rgba(201,168,76,0.2);
  --text:#E8E6E1;--muted:#8B8680;
  --green:#3DD68C;--red:#FF5A5A;
  --green-bg:rgba(61,214,140,0.1);--red-bg:rgba(255,90,90,0.1);
}

body{
  background:var(--dark);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  background-image:radial-gradient(ellipse 70% 40% at 50% -5%,rgba(201,168,76,0.1) 0%,transparent 70%);
}

/* ── LOGIN ── */
#login-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:32px 24px;gap:24px;
}
#login-screen.hidden{display:none;}

.login-badge{
  display:inline-block;background:rgba(201,168,76,0.15);border:1px solid var(--gold);
  color:var(--gold);font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;padding:5px 14px;border-radius:100px;margin-bottom:14px;
}
.login-title{font-size:28px;font-weight:700;margin-bottom:6px;text-align:center;}
.login-sub{color:var(--muted);font-size:14px;text-align:center;}
.login-card{
  width:100%;max-width:420px;background:var(--dark2);border:1px solid var(--border);
  border-radius:20px;padding:28px;
}
.login-label{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.login-input{
  width:100%;background:var(--dark3);border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;
  font-family:inherit;outline:none;margin-bottom:16px;transition:border-color 0.2s;
}
.login-input:focus{border-color:var(--gold);}
.login-btn{
  width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:var(--dark);border:none;border-radius:14px;padding:16px;
  font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;
}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:10px;min-height:18px;}

/* ── APP ── */
#app-screen{display:none;flex-direction:column;min-height:100vh;}
#app-screen.visible{display:flex;}

.app-header{
  position:sticky;top:0;z-index:10;
  background:rgba(13,17,23,0.95);backdrop-filter:blur(10px);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.header-title{font-size:15px;font-weight:700;color:var(--gold);}
.logout-btn{
  background:none;border:1px solid rgba(255,255,255,0.1);color:var(--muted);
  border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;
}

.app-main{flex:1;padding:16px;max-width:600px;width:100%;margin:0 auto;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat-box{
  background:var(--dark2);border:1px solid var(--border);border-radius:12px;
  padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.stat-val{font-size:22px;font-weight:700;line-height:1;}
.stat-lbl{font-size:10px;color:var(--muted);}

/* CARDS */
.card{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;}
.card-label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}

.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.diff-btn{
  background:var(--dark3);border:2px solid rgba(255,255,255,0.08);border-radius:12px;
  padding:14px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;
  gap:4px;transition:all 0.2s;font-family:inherit;
}
.diff-btn .dlabel{font-weight:600;font-size:14px;color:var(--text);}
.diff-btn small{font-size:11px;color:var(--muted);}

.round-row{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--text);margin-bottom:10px;}
.round-row:last-child{margin-bottom:0;}

/* BUTTONS */
.primary-btn{
  width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:var(--dark);border:none;border-radius:16px;padding:17px;
  font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;font-family:inherit;
  display:block;
}
.secondary-btn{
  width:100%;background:transparent;color:var(--text);
  border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:15px;
  font-size:15px;font-weight:500;cursor:pointer;margin-bottom:12px;font-family:inherit;
  display:block;
}
.danger-btn{
  width:100%;background:transparent;color:var(--red);
  border:1px solid rgba(255,90,90,0.3);border-radius:16px;padding:15px;
  font-size:15px;cursor:pointer;margin-bottom:12px;font-family:inherit;
  display:block;
}

/* PROGRESS */
.prog-wrap{margin-bottom:16px;}
.prog-top{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;}
.prog-bar{height:4px;background:var(--dark3);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:99px;transition:width 0.4s;}

/* QUESTION */
.q-tag{font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.q-text{font-size:17px;line-height:1.55;color:var(--text);margin-bottom:22px;font-weight:500;}

/* ANSWERS */
.answers{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.ans-btn{
  background:var(--dark3);border:1px solid rgba(255,255,255,0.08);border-radius:14px;
  padding:13px 14px;color:var(--text);font-family:inherit;font-size:14px;
  cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:12px;
  transition:all 0.2s;line-height:1.45;width:100%;
}
.letter{
  width:28px;height:28px;min-width:28px;border-radius:8px;
  background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;margin-top:1px;
}
.ans-btn.correct{background:var(--green-bg);border-color:var(--green);}
.ans-btn.correct .letter{background:var(--green);color:var(--dark);}
.ans-btn.wrong{background:var(--red-bg);border-color:var(--red);}
.ans-btn.wrong .letter{background:var(--red);color:#fff;}
.ans-btn.locked{cursor:default;}
.ans-btn.locked:not(.correct):not(.wrong){opacity:0.35;}

.feedback{
  border-radius:12px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.6;
  display:none;
}
.feedback.show{display:block;}
.feedback.ok{background:var(--green-bg);border:1px solid rgba(61,214,140,0.3);color:#5DF0A0;}
.feedback.err{background:var(--red-bg);border:1px solid rgba(255,90,90,0.3);color:#FF8080;}
.feedback b{display:block;margin-bottom:4px;font-size:14px;}

/* DETAIL */
.detail-item{
  background:var(--dark2);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:10px;
}
.detail-bar{height:6px;background:var(--dark);border-radius:99px;margin:8px 0 4px;}
.detail-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-l));}

/* RESULT */
.result-screen{text-align:center;padding:40px 0;}
.score-big{font-size:80px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:8px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp 0.3s ease;}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div style="text-align:center">
    <div class="login-badge">FaOnSa Prüfungsvorbereitung auf die Fachkundeprüfung</div>
    <div class="login-title">Taxi & Mietwagenverkehr</div>
    <div class="login-sub">Prüfungsvorbereitung · 941 Fragen</div>

  <div class="login-card">
    <div class="login-label">Zugangscode eingeben</div>
    <input class="login-input" id="code-input" type="text"

           autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">

    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app-screen">

    <div class="header-title">🚕 FaOnSa Taxi Quiz</div>

</div>

const ALL_QUESTIONS = [{"id":1,"gesetz":"PBefG","frage":"#0001 Was regelt das Personenbeförderungsgesetz (PBefG)?","antworten":["Das PBefG regelt die geschäftsmäßige oder entgeltliche Beförderung von Personen mit Straßenbahnen, Oberleitungsomnibussen und Kraftfahrzeugen (§1 Abs. 1 PBefG).","Ja, das Beförderungsentgelt wird von der Genehmigungsbehörde festgelegt (§39 PBefG).","Das PBefG regelt die geschäftsmäßige oder unentgeltliche Beförderung von Personen mit Straßenbahnen, Oberleitungsomnibussen und Kraftfahrzeugen (§1 Abs. 1 PBefG)."],"richtig":0,"erklaerung":"Das PBefG regelt die geschäftsmäßige oder entgeltliche Beförderung von Personen mit Straßenbahnen, Oberleitungsomnibussen und Kraftfahrzeugen (§1 Abs. 1 PBefG)."},{"id":2,"gesetz":"PBefG","frage":"#0002 Welche Verkehrsarten unterscheidet das PBefG?","antworten":["Öffentlicher Linienverkehr (ÖPNV), Gelegenheitsverkehr (inkl. Taxi- und Mietwagenverkehr) (§42 - §49 PBefG).","privater Linienverkehr (ÖPNV), Gelegenheitsverkehr (inkl. Taxi- und Mietwagenverkehr) (§42 - §49 PBefG).","Öffentlicher Gelegenheitsverkehr (ÖPNV), Gelegenheitsverkehr (inkl. Taxi- und Mietwagenverkehr) (§42 - §49 PBefG)."],"richtig":0,"erklaerung":"Öffentlicher Linienverkehr (ÖPNV), Gelegenheitsverkehr (inkl. Taxi- und Mietwagenverkehr) (§42 - §49 PBefG)."},{"id":3,"gesetz":"PBefG","frage":"#0003 Welche Genehmigungspflichten bestehen im Personenverkehr?","antworten":["Alle gewerblichen Personenbeförderungen mit Kraftfahrzeugen sind genehmigungspflichtig (§2 PBefG).","Alle gewerblichen Personenbeförderungen mit Kraftfahrzeugen sind Anzeigepflichtig (§2 PBefG).","Ja, aber nur mit vorher vereinbartem Preis oder über einen Kostenträger (§49 PBefG)."],"richtig":0,"erklaerung":"Alle gewerblichen Personenbeförderungen mit Kraftfahrzeugen sind genehmigungspflichtig (§2 PBefG)."},{"id":4,"gesetz":"PBefG","frage":"#0004 Wer erteilt die Genehmigung für Taxen oder Mietwagen?","antworten":["Die örtlich zuständige Aufsichtsbehörde (§11 PBefG).","Die örtlich zuständige Genehmigungsbehörde (§11 PBefG).","Mindestens ein Viertel des in der Verordnung (EG) Nr. 1071/2009 festgelegten Betrags pro Fahrzeug (§13 PBefG)."],"richtig":1,"erklaerung":"Die örtlich zuständige Genehmigungsbehörde (§11 PBefG)."},{"id":5,"gesetz":"PBefG","frage":"#0005 Wie lange ist eine Taxikonzession gültig?","antworten":["In der Regel maximal 3 Jahre, danach kann sie verlängert werden (§16 PBefG).","In der Regel maximal 5 Jahre, danach kann sie verlängert werden (§16 PBefG).","In der Regel maximal 10 Jahre, danach kann sie verlängert werden (§16 PBefG)."],"richtig":1,"erklaerung":"In der Regel maximal 5 Jahre, danach kann sie verlängert werden (§16 PBefG)."},{"id":6,"gesetz":"PBefG","frage":"#0006 Welche Bedingungen müssen Unternehmer für eine Konzession erfüllen?","antworten":["Alle gewerblichen Personenbeförderungen mit Kraftfahrzeugen sind genehmigungspflichtig (§2 PBefG).","Bußgelder oder Fahrzeugentzug (§61 PBefG).","Persönliche Zuverlässigkeit, finanzielle Leistungsfähigkeit und fachliche Eignung (§13 PBefG)."],"richtig":2,"erklaerung":"Persönliche Zuverlässigkeit, finanzielle Leistungsfähigkeit und fachliche Eignung (§13 PBefG)."},{"id":7,"gesetz":"PBefG","frage":"#0007 Was ist der Hauptunterschied zwischen Taxen und Mietwagen?","antworten":["Taxen sind privat verfügbar, haben eine Beförderungspflicht und unterliegen festen Tarifen (§47 PBefG). Mietwagen dürfen nur nach vorheriger Bestellung fahren, haben keine Tarifbindung und unterliegen der Rückkehrpflicht (§49 PBefG).","Taxen sind öffentlich verfügbar, haben eine Betriebspflicht und unterliegen festen Tarifen (§47 PBefG). Mietwagen dürfen nur nach vorheriger Bestellung fahren, haben keine Tarifbindung und unterliegen der Rückkehrpflicht (§49 PBefG).","Taxen sind öffentlich verfügbar, haben eine Beförderungspflicht und unterliegen festen Tarifen (§47 PBefG). Mietwagen dürfen nur nach vorheriger Bestellung fahren, haben keine Tarifbindung und unterliegen der Rückkehrpflicht (§49 PBefG)."],"richtig":2,"erklaerung":"Taxen sind öffentlich verfügbar, haben eine Beförderungspflicht und unterliegen festen Tarifen (§47 PBefG). Mietwagen dürfen nur nach vorheriger Bestellung fahren, haben keine Tarifbindung und unterliegen der Rückkehrpflicht (§49 PBefG)."},{"id":8,"gesetz":"PBefG","frage":"#0008 Welche Betriebspflicht haben Taxiunternehmen?","antworten":["Taxen unterliegen der Beförderungspflicht und müssen bereitgestellt werden (§47 Abs. 1 PBefG).","Taxen unterliegen der Betriebspflicht und müssen bereitgestellt werden (§47 Abs. 1 PBefG).","Mietwagen unterliegen der Betriebspflicht und müssen bereitgestellt werden (§47 Abs. 1 PBefG)."],"richtig":1,"erklaerung":"Taxen unterliegen der Betriebspflicht und müssen bereitgestellt werden (§47 Abs. 1 PBefG)."},{"id":9,"gesetz":"PBefG","frage":"#0009 Sind Mietwagen ebenfalls betriebspflichtig?","antworten":["Nein, Mietwagen haben keine Betriebspflicht und dürfen Fahrten ablehnen (§49 PBefG).","Ja, Mietwagen haben keine Betriebspflicht und dürfen Fahrten ablehnen (§49 PBefG).","Nein, Mietwagen haben keine Beförderungspflicht und dürfen Fahrten ablehnen (§49 PBefG)."],"richtig":0,"erklaerung":"Nein, Mietwagen haben keine Betriebspflicht und dürfen Fahrten ablehnen (§49 PBefG)."},{"id":10,"gesetz":"PBefG","frage":"#0010 Wann darf ein Taxi eine Beförderung verweigern?","antworten":["In der Regel mindestens alle fünf Jahre, spätestens jedoch bei einer Verlängerung der Genehmigung (§15 PBefG).","Nur bei Gefährdung der Sicherheit oder unangemessenem Verhalten des Fahrgasts (§47 Abs. 1 PBefG).","Taxischild, Konzessionsnummer, Taxameter (sofern Tarifpflicht besteht) (§47 Abs. 2 PBefG)."],"richtig":1,"erklaerung":"Nur bei Gefährdung der Sicherheit oder unangemessenem Verhalten des Fahrgasts (§47 Abs. 1 PBefG)."},{"id":11,"gesetz":"PBefG","frage":"#0011 Sind Taxen an feste Tarife gebunden?","antworten":["Ja, das Beförderungsentgelt wird von der Aufsichtsbehörde festgelegt (§39 PBefG).","Nein, das Beförderungsentgelt wird  4 FPersG)."],"richtig":2,"erklaerung":"Er muss sicherstellen, dass die Fahrer die Vorschriften einhalten (§ 4 FPersG)."},{"id":426,"gesetz":"FPersG","frage":"#0426 Welche Aufbewahrungspflichten haben Taxiunternehmer?","antworten":["11 Stunden, dreimal pro Woche verkürzbar auf 9 Stunden (§ 2 FPersG i.V.m. Verordnung (EG) Nr. 561/2006).","Es regelt die Arbeitszeiten, Lenkzeiten, Ruhezeiten und Fahrtunterbrechungen des Fahrpersonals (§ 2 FPersG).","Fahrtenbücher, Tätigkeitsnachweise und Abrechnungen müssen mindestens ein Jahr aufbewahrt werden (§ 4 Abs. 3 FPersG)."],"richtig":2,"erklaerung":"Fahrtenbücher, Tätigkeitsnachweise und Abrechnungen müssen mindestens ein Jahr aufbewahrt werden (§ 4 Abs. 3 FPersG)."},{"id":427,"gesetz":"FPersG","frage":"#0427 Welche Ordnungswidrigkeiten können nach dem FPersG geahndet werden?","antworten":["Das Bundesamt für Logistik und Mobilität (BALM) (§ 9 FPersG).","Geldbußen bis zu 30.000 € (§ 8 FPersG).","Verstöße gegen Lenkzeiten, Ruhezeiten, Fahrtenschreiberpflichten, Arbeitszeitregelungen (§ 8 FPersG)."],"richtig":2,"erklaerung":"Verstöße gegen Lenkzeiten, Ruhezeiten, Fahrtenschreiberpflichten, Arbeitszeitregelungen (§ 8 FPersG)."},{"id":428,"gesetz":"FPersG","frage":"#0428 Welche Behörde ist für die Ahndung von Verstößen zuständig?","antworten":["Tätigkeitsnachweise in schriftlicher oder digitaler Form (§ 2 FPersG).","Die Regelungen zur Arbeitszeitgestaltung gehen dem allgemeinen Arbeitszeitgesetz vor (§ 1 Abs. 1 FPersG).","Das Bundesamt für Logistik und Mobilität (BALM) (§ 9 FPersG)."],"richtig":2,"erklaerung":"Das Bundesamt für Logistik und Mobilität (BALM) (§ 9 FPersG)."},{"id":429,"gesetz":"FPersG","frage":"#0429 Wie hoch können Strafen für Unternehmen ausfallen, die Fahrer zu Verstößen anweisen?","antworten":["Kontrolle von Arbeitszeiten, Fahrtenschreibern, Tätigkeitsnachweisen und Ruhezeiten (§ 4 Abs. 1a FPersG).","Bis zu 30.000 € (§ 8 FPersG).","Maximal 90 Stunden (§ 2 FPersG i.V.m. Verordnung (EG) Nr. 561/2006)."],"richtig": :453,"gesetz":"ArbZG","frage":"#0453 Wann gilt Nachtzeit gemäß ArbZG?","antworten":["Ja, sie unterliegen den allgemeinen Regelungen des ArbZG und den EU-Vorschriften (§ 4 ArbZG).","Zwischen 23:00 und 6:00 Uhr, in Bäckereien und Konditoreien zwischen 22:00 und 5:00 Uhr (§ 2 Abs. 3 ArbZG).","Wenn Verstöße vorsätzlich begangen werden und Gesundheit oder Arbeitskraft gefährdet wird (§ 23 ArbZG)."],"richtig":1,"erklaerung":"Zwischen 23:00 und 6:00 Uhr, in Bäckereien und Konditoreien zwischen 22:00 und 5:00 Uhr (§ 2 Abs. 3 ArbZG)."},{"id":454,"gesetz":"ArbZG","frage":"#0454 Wie viele Stunden darf die tägliche Arbeitszeit maximal betragen?","antworten":["8 Stunden, ausnahmsweise bis zu 10 Stunden, wenn der Schnitt innerhalb von 6 Monaten 8 Stunden nicht überschreitet (§ 3 ArbZG).","12 Stunden, ausnahmsweise bis zu 10 Stunden, wenn der Schnitt innerhalb von 6 Monaten 8 Stunden nicht überschreitet (§ 3 ArbZG).","4 Stunden, ausnahmsweise bis zu 10 Stunden, wenn der Schnitt innerhalb von 6 Monaten 8 Stunden nicht überschreitet (§ 3 ArbZG)."],"richtig":0,"erklaerung":"8 Stunden, ausnahmsweise bis zu 10 Stunden, wenn der Schnitt innerhalb von 6 Monaten 8 Stunden nicht überschreitet (§ 3 ArbZG)."},{"id":455,"gesetz":"ArbZG","frage":"#0455 Unter welchen Bedingungen darf die Arbeitszeit über 10 Stunden verlängert werden?","antworten":["Ja, wenn gesundheitliche Gründe, Kinderbetreuung oder Pflege eines Angehörigen vorliegen (§ 6 Abs. 4 ArbZG).","Wenn regelmäßig Arbeitsbereitschaft oder Bereitschaftsdienst anfällt (§ 7 Abs. 1 ArbZG).","Nein, Arbeitnehmer dürfen von 0 bis 24 Uhr nicht beschäftigt werden (§ 9 Abs. 1 ArbZG)."],"richtig":1,"erklaerung":"Wenn regelmäßig Arbeitsbereitschaft oder Bereitschaftsdienst anfällt (§ 7 Abs. 1 ArbZG)."},{"id":456,"gesetz":"ArbZG","frage":"#0456 Welche Pausenregelungen gibt es?","antworten":["60 Minuten Pause bei mehr als 6 Stunden Arbeit, 45 Minuten Pause bei mehr als 9 Stunden Arbeit (§ 4 ArbZG).","14 Minuten Pause bei mehr als 6 Stunden Arbeit, 4 age":"#0460 Kann die Ruhezeit verkürzt werden?","antworten":["Ja, um bis zu 1 Stunde, wenn innerhalb eines Monats eine Ruhezeit auf mindestens 12 Stunden verlängert wird (§ 5 Abs. 2 ArbZG).","Ja, um bis zu 2 Stunde, wenn innerhalb eines Monats eine Ruhezeit auf mindestens 12 Stunden verlängert wird (§ 5 Abs. 2 ArbZG).","Ja, um bis zu 3 Stunde, wenn innerhalb eines Monats eine Ruhezeit auf mindestens 12 Stunden verlängert wird (§ 5 Abs. 2 ArbZG)."],"richtig":0,"erklaerung":"Ja, um bis zu 1 Stunde, wenn innerhalb eines Monats eine Ruhezeit auf mindestens 12 Stunden verlängert wird (§ 5 Abs. 2 ArbZG)."},{"id":461,"gesetz":"ArbZG","frage":"#0461 Welche Ruhezeiten gelten für Fahrer im Straßentransport?","antworten":["Mindestens 11 Stunden tägliche und 45 Stunden wöchentliche Ruhezeit nach EU-Verordnung (EG) Nr. 561/2006 (§ 21a Abs. 5 ArbZG).","Mindestens 10 Stunden tägliche und 45 Stunden wöchentliche Ruhezeit nach EU-Verordnung (EG) Nr. 561/2006 (§ 21a Abs. 5 ArbZG).","Mindestens 12 Stunden tägliche und 45 Stunden wöchentliche Ruhezeit nach EU-Verordnung (EG) Nr. 561/2006 (§ 21a Abs. 5 ArbZG)."],"richtig":0,"erklaerung":"Mindestens 11 Stunden tägliche und 45 Stunden wöchentliche Ruhezeit nach EU-Verordnung (EG) Nr. 561/2006 (§ 21a Abs. 5 ArbZG)."},{"id":462,"gesetz":"ArbZG","frage":"#0462 Welche Arbeitszeitregelung gilt für Taxifahrer?","antworten":["Ja, alle 3 Jahre, ab 50 Jahren jährlich, auf Kosten des Arbeitgebers (§ 6 Abs. 3 ArbZG).","Sie unterliegen den allgemeinen Regelungen des ArbZG und den EU-Sozialvorschriften für den Straßentransport (§ 21a ArbZG).","Ja, wenn gesundheitliche Gründe, Kinderbetreuung oder Pflege eines Angehörigen vorliegen (§ 6 Abs. 4 ArbZG)."],"richtig":1,"erklaerung":"Sie unterliegen den allgemeinen Regelungen des ArbZG und den EU-Sozialvorschriften für den Straßentransport (§ 21a ArbZG)."},{"id":463,"gesetz":"ArbZG","frage":"#0463 Welche Regelungen gelten für den Straßentransport?","antworten":["Maximal 49 Stunden Wochenarbeitszeit, verlängerbar auf 60 Stunden, wenn der Schnitt über 4 Monate 48 Stunden nicht überschreitet (§ 21a Abs. 4 ArbZG).","Maximal 47 Stunden Wochenarbeitszeit, verlängerbar auf 60 Stunden, wenn der Schnitt über 4 Monate 48 Stunden nicht überschreitet (§ 21a Abs. 4 ArbZG).","Maximal 48 Stunden Wochenarbeitszeit, verlängerbar auf 60 Stunden, wenn der Schnitt über 4 Monate 48 Stunden nicht überschreitet (§ 21a Abs. 4 ArbZG)."],"richtig":2,"erklaerung":"Maximal 48 Stunden Wochenarbeitszeit, verlängerbar auf 60 Stunden, wenn der Schnitt über 4 Monate 48 Stunden nicht überschreitet (§ 21a Abs. 4 ArbZG)."},{"id":464,"gesetz":"ArbZG","frage":"#0464 Müssen Taxifahrer Ruhepausen einhalten?","antworten":["Ja, sie unterliegen den allgemeinen Regelungen des ArbZG und den EU-Vorschriften (§ 4 ArbZG).","Überschreiten der Arbeitszeitgrenzen, keine Einhaltung von Ruhepausen oder Sonn- und Feiertagsruhe (§ 22 ArbZG).","Nein, sie unterliegen den allgemeinen Regelungen des ArbZG und den EU-Vorschriften (§ 4 ArbZG)."],"richtig":0,"erklaerung":"Ja, sie unterliegen den allgemeinen Regelungen des ArbZG und den EU-Vorschriften (§ 4 ArbZG)."},{"id":465,"gesetz":"ArbZG","frage":"#0465 Ist Sonntagsarbeit grundsätzlich erlaubt?","antworten":["Nein, Arbeitnehmer dürfen von 0 bis 24 Uhr nicht beschäftigt werden (§ 9 Abs. 1 ArbZG).","Ja, Arbeitnehmer dürfen von 0 bis 24 Uhr nicht beschäftigt werden (§ 9 Abs. 1 ArbZG).","Nein, Arbeitgeber dürfen von 0 bis 24 Uhr nicht beschäftigt werden (§ 9 Abs. 1 ArbZG)."],"richtig":0,"erklaerung":"Nein, Arbeitnehmer dürfen von 0 bis 24 Uhr nicht beschäftigt werden (§ 9 Abs. 1 ArbZG)."},{"id":466,"gesetz":"ArbZG","frage":"#0466 Gilt für Taxi- und Mietwagenfahrer die Sonn- und Feiertagsruhe?","antworten":["Überschreiten der Arbeitszeitgrenzen, keine Einhaltung von Ruhepausen oder Sonn- und Feiertagsruhe (§ 22 ArbZG).","Nein, sie dürfen an Sonn- und Feiertagen arbeiten (§ 10 Abs. 1 ArbZG).","Ja, sie dürfen an Sonn- und Feiertagen arbeiten (§ 10 Abs. 1 ArbZG)."],"richtig":1,"erkl ern zur Verbesserung des Arbeitsschutzes (§ 20a ArbSchG)."},{"id":581,"gesetz":"ArbSchG","frage":"#0581","antworten":["","Für alle Beschäftigten, außer Hausangestellte in privaten Haushalten und bestimmte Gruppen im öffentlichen Dienst (§ 2 ArbSchG).","Die Verbesserung der Sicherheit und des Gesundheitsschutzes der Beschäftigten bei der Arbeit (§ 1 ArbSchG)."],"richtig":0,"erklaerung":""},{"id":601,"gesetz":"ASiG","frage":"#0601 Muss ein Taxiunternehmen eine Fachkraft für Arbeitssicherheit bestellen?","antworten":["Nein, wenn es eine bestimmte Anzahl an Mitarbeitern überschreitet oder besondere Sicherheitsrisiken bestehen (§ 5 ASiG).","Ja, wenn es eine bestimmte Anzahl an Mitarbeitern überschreitet oder besondere Sicherheitsrisiken bestehen (§ 5 ASiG).","Ja, sie müssen ihre Fachkunde unabhängig anwenden (§ 8 ASiG)."],"richtig":1,"erklaerung":"Ja, wenn es eine bestimmte Anzahl an Mitarbeitern überschreitet oder besondere Sicherheitsrisiken bestehen (§ 5 ASiG)."},{"id":602,"gesetz":"ASiG","frage":"#0602 Welche Rolle spielen Betriebsärzte in Taxi- und Mietwagenbetrieben?","antworten":["Sie beraten das Unternehmen in Gesundheitsfragen und führen Vorsorgeuntersuchungen für Unternehmer durch (§ 3 ASiG).","Sie beraten das Unternehmen in Gesundheitsfragen und führen Vorsorgeuntersuchungen für Fahrer durch (§ 3 ASiG).","Sie kann Anordnungen treffen und Maßnahmen verlangen (§ 12 ASiG)."],"richtig":1,"erklaerung":"Sie beraten das Unternehmen in Gesundheitsfragen und führen Vorsorgeuntersuchungen für Fahrer durch (§ 3 ASiG)."},{"id":603,"gesetz":"ASiG","frage":"#0603 Welche Gefährdungen für Taxifahrer müssen bei der Arbeitssicherheit berücksichtigt werden?","antworten":["Mindestens einmal pro Quartal (§ 11 ASiG).","Risiken durch lange Sitzzeiten, Unfallgefahr, Überfälle und Stress (§ 1 ASiG).","Er muss sicherstellen, dass Arbeitsbedingungen ergonomisch und gesundheitsschonend sind (§ 3 ASiG)."],"richtig":1,"erklaerung":"Risiken durch lange Sitzzeiten, Unfallgefahr, Überfälle un s. 1 BUrlG)."],"richtig":1,"erklaerung":"Nach dem durchschnittlichen Verdienst der letzten 13 Wochen vor Urlaubsbeginn, ohne Überstunden (§ 11 Abs. 1 BUrlG)."},{"id":767,"gesetz":"BUrlG","frage":"#0767 Wann muss das Urlaubsentgelt ausgezahlt werden?","antworten":["Vor Urlaubsantritt (§ 11 Abs. 2 BUrlG).","Urlaub muss im laufenden Kalenderjahr genommen werden; eine Übertragung ist nur bei dringenden Gründen bis zum 31. März möglich (§ 7 Abs. 3 BUrlG).","Mindestens 24 Werktage pro Jahr (§ 3 Abs. 1 BUrlG)."],"richtig":0,"erklaerung":"Vor Urlaubsantritt (§ 11 Abs. 2 BUrlG)."},{"id":768,"gesetz":"BUrlG","frage":"#0768 Darf der Arbeitgeber während des Urlaubs eine Maßnahme der medizinischen Vorsorge anrechnen?","antworten":["Nein, diese zählt nicht als Urlaub (§ 10 BUrlG).","Ja, diese zählt nicht als Urlaub (§ 10 BUrlG).","Die durch ärztliches Attest nachgewiesenen Krankheitstage werden nicht auf den Urlaub angerechnet (§ 9 BUrlG)."],"richtig":0,"erklaerung":"Nein, diese zählt nicht als Urlaub (§ 10 BUrlG)."},{"id":769,"gesetz":"BUrlG","frage":"#0769 Was gilt für Arbeitnehmer in Heimarbeit bezüglich des Urlaubs?","antworten":["Bußgelder und arbeitsrechtliche Konsequenzen (§ 15 BUrlG).","Es gelten besondere Regelungen für Urlaubsentgelt (§ 12 BUrlG).","Alle Kalendertage außer Sonn- und gesetzliche Feiertage (§ 3 Abs. 2 BUrlG)."],"richtig":1,"erklaerung":"Es gelten besondere Regelungen für Urlaubsentgelt (§ 12 BUrlG)."},{"id":770,"gesetz":"BUrlG","frage":"#0770 Kann von den Bestimmungen des BUrlG durch Tarifverträge abgewichen werden?","antworten":["Ja, aber nur, wenn es für den Arbeitgeber nicht nachteiliger ist (§ 13 BUrlG).","Nein, aber nur, wenn es für den Arbeitnehmer nicht nachteiliger ist (§ 13 BUrlG).","Ja, aber nur, wenn es für den Arbeitnehmer nicht nachteiliger ist (§ 13 BUrlG)."],"richtig":2,"erklaerung":"Ja, aber nur, wenn es für den Arbeitnehmer nicht nachteiliger ist (§ 13 BUrlG)."},{"id":771,"gesetz":"BUrlG","frage":"#0771 Welche Behörde überwacht die Einhal ahlten Urlaubsentgelts ist nicht möglich (§ 5 Abs. 3 BUrlG)."],"richtig":2,"erklaerung":"Eine Rückforderung des zu viel gezahlten Urlaubsentgelts ist nicht möglich (§ 5 Abs. 3 BUrlG)."},{"id":780,"gesetz":"BUrlG","frage":"#0780 Kann ein Arbeitnehmer nach Ende des Arbeitsverhältnisses seinen Resturlaub noch nehmen?","antworten":["Mindestens 24 Werktage pro Jahr (§ 3 Abs. 1 BUrlG).","Nein, der Resturlaub muss abgegolten werden (§ 7 Abs. 4 BUrlG).","Ja, der Resturlaub muss abgegolten werden (§ 7 Abs. 4 BUrlG)."],"richtig":1,"erklaerung":"Nein, der Resturlaub muss abgegolten werden (§ 7 Abs. 4 BUrlG)."},{"id":781,"gesetz":"BUrlG","frage":"#0781","antworten":["Nein, gewährter Urlaub kann nicht nachträglich entzogen werden (§ 5 Abs. 3 BUrlG).","","Eine Rückforderung des zu viel gezahlten Urlaubsentgelts ist nicht möglich (§ 5 Abs. 3 BUrlG)."],"richtig":1,"erklaerung":""},{"id":801,"gesetz":"EntgFG","frage":"#0801 Haben Taxifahrer Anspruch auf Entgeltfortzahlung im Krankheitsfall?","antworten":["Ja, sie haben Anspruch auf bis zu sechs Wochen Entgeltfortzahlung durch den Arbeitgeber (§ 3 Abs. 1 EntgFG).","Ja, sie haben Anspruch auf bis zu sechs Wochen Entgeltfortzahlung durch den Arbeitnehmer (§ 3 Abs. 1 EntgFG).","Nein, sie haben Anspruch auf bis zu sechs Wochen Entgeltfortzahlung durch den Arbeitgeber (§ 3 Abs. 1 EntgFG)."],"richtig":0,"erklaerung":"Ja, sie haben Anspruch auf bis zu sechs Wochen Entgeltfortzahlung durch den Arbeitgeber (§ 3 Abs. 1 EntgFG)."},{"id":802,"gesetz":"EntgFG","frage":"#0802 Ab wann besteht der Anspruch auf Entgeltfortzahlung für einen angestellten Taxifahrer?","antworten":["Er muss seinen Arbeitgeber und ggf. seine Krankenkasse unverzüglich informieren (§ 5 Abs. 2 EntgFG).","Er muss dem Arbeitgeber die Arbeitsunfähigkeit unverzüglich mitteilen und nach drei Tagen eine ärztliche Bescheinigung vorlegen (§ 5 Abs. 1 EntgFG).","Nach vier Wochen ununterbrochener Dauer des Arbeitsverhältnisses (§ 3 Abs. 3 EntgFG)."],"richtig":2,"erklaerung":"Nach vier 8 Abs. 5 TzBfG).","Ja, sofern keine dringenden betrieblichen Gründe entgegenstehen (§ 8 Abs. 4 TzBfG)."],"richtig":1,"erklaerung":"Der Arbeitnehmer kann seinen Anspruch vor dem Arbeitsgericht einklagen (§ 8 Abs. 5 TzBfG)."},{"id":978,"gesetz":"TzBfG","frage":"#0978 Welche Folgen hat eine unrechtmäßige Befristung?","antworten":["Das Arbeitsverhältnis gilt als befristet (§ 16 TzBfG).","Das Arbeitsverhältnis gilt als unbefristet (§ 16 TzBfG).","Das Arbeitsverhältnis gilt als ununbefristet (§ 16 TzBfG)."],"richtig":1,"erklaerung":"Das Arbeitsverhältnis gilt als unbefristet (§ 16 TzBfG)."},{"id":979,"gesetz":"TzBfG","frage":"#0979 Kann ein Arbeitnehmer, der in Teilzeit arbeitet, die Rückkehr zur Vollzeit verlangen?","antworten":["Das Arbeitsverhältnis gilt als unbefristet (§ 16 TzBfG).","Ja, er muss bei der Besetzung freier Stellen bevorzugt berücksichtigt werden (§ 9 TzBfG).","Nein, er muss bei der Besetzung freier Stellen bevorzugt berücksichtigt werden (§ 9 TzBfG)."],"richtig":1,"erklaerung":"Ja, er muss bei der Besetzung freier Stellen bevorzugt berücksichtigt werden (§ 9 TzBfG)."},{"id":980,"gesetz":"TzBfG","frage":"#0980 Was passiert, wenn ein Arbeitgeber einen Antrag auf Teilzeit nicht rechtzeitig beantwortet?","antworten":["Die Teilzeit gilt automatisch als bewilligt (§ 8 Abs. 5 TzBfG).","Die Vollzeit gilt automatisch als bewilligt (§ 8 Abs. 5 TzBfG).","Die Förderung von Teilzeitarbeit und die Verhinderung der Diskriminierung von Teilzeit- und befristet Beschäftigten (§ 1 TzBfG)."],"richtig":0,"erklaerung":"Die Teilzeit gilt automatisch als bewilligt (§ 8 Abs. 5 TzBfG)."},{"id":981,"gesetz":"TzBfG","frage":"#0981","antworten":["","Der Arbeitnehmer kann seinen Anspruch vor dem Arbeitsgericht einklagen (§ 8 Abs. 5 TzBfG).","Die Förderung von Teilzeitarbeit und die Verhinderung der Diskriminierung von Teilzeit- und befristet Beschäftigten (§ 1 TzBfG)."],"richtig":0,"erklaerung":""},{"id":1451,"gesetz":"GewStG","frage":"#1451 Welche Steuerpflicht gilt für Taxi- und Mietwagenunternehmen nach dem Gewerbesteuergesetz?","antworten":["Taxi- und Taxenunternehmen unterliegen als Gewerbebetriebe der Gewerbesteuer (§ 2 GewStG).","Es erfolgt eine Erstattung nach der Steuererklärung (§ 20 GewStG).","Taxi- und Mietwagenunternehmen unterliegen als Gewerbebetriebe der Gewerbesteuer (§ 2 GewStG)."],"richtig":2,"erklaerung":"Taxi- und Mietwagenunternehmen unterliegen als Gewerbebetriebe der Gewerbesteuer (§ 2 GewStG)."},{"id":1452,"gesetz":"GewStG","frage":"#1452 Wie wird der Gewerbeertrag für Taxi- und Mietwagenunternehmen ermittelt?","antworten":["Der Gewerbeertrag ist der nach Einkommensteuer- oder Körperschaftsteuergesetz ermittelte Gewinn, bereinigt um Hinzurechnungen und Kürzungen (§ 7 GewStG).","Ja, durch strategische Kürzungen und Gestaltungsmöglichkeiten (§ 9 GewStG).","Die gezahlte Grundsteuer für betriebliche Grundstücke kann vom Gewerbeertrag gekürzt werden (§ 9 GewStG)."],"richtig":0,"erklaerung":"Der Gewerbeertrag ist der nach Einkommensteuer- oder Körperschaftsteuergesetz ermittelte Gewinn, bereinigt um Hinzurechnungen und Kürzungen (§ 7 GewStG)."},{"id":1453,"gesetz":"GewStG","frage":"#1453 Gibt es eine Freigrenze für kleine Taxi- und Mietwagenunternehmen?","antworten":["Ja, durch strategische Kürzungen und Gestaltungsmöglichkeiten (§ 9 GewStG).","Ja, für natürliche Personen und Personengesellschaften gilt ein Freibetrag von 24.500 € (§ 11 GewStG).","Nein, für natürliche Personen und Personengesellschaften gilt ein Freibetrag von 24.500 € (§ 11 GewStG)."],"richtig":1,"erklaerung":"Ja, für natürliche Personen und Personengesellschaften gilt ein Freibetrag von 24.500 € (§ 11 GewStG)."},{"id":1454,"gesetz":"GewStG","frage":"#1454 Welche Hinzurechnungen gelten für Taxi- und Mietwagenunternehmen?","antworten":["Nein, aber Elektro-Taxis können über andere Steuererleichterungen wie die Kfz-Steuerbefreiung profitieren.","Ein Teil der Miet-, Pacht- und Leasingaufwendungen sowie Zinsen auf betriebliche Schulden werden dem Gewinn wieder hinzugerechnet (§ 8 GewStG).","Gewinnanteile von Tochterunternehmen können unter bestimmten Voraussetzungen steuerlich begünstigt sein (§ 9 GewStG)."],"richtig":1,"erklaerung":"Ein Teil der Miet-, Pacht- und Leasingaufwendungen sowie Zinsen auf betriebliche Schulden werden dem Gewinn wieder hinzugerechnet (§ 8 GewStG)."},{"id":1455,"gesetz":"GewStG","frage":"#1455 Welche Kürzungen sind für Taxi- und Mietwagenunternehmen relevant?","antworten":["Die gezahlte Grundsteuer für betriebliche Grundstücke kann vom Gewerbeertrag gekürzt werden (§ 9 GewStG).","Der Gewerbeertrag des fusionierten Unternehmens wird neu berechnet (§ 7 GewStG).","Ein Teil der Leasingraten wird dem Gewinn wieder hinzugerechnet (§ 8 GewStG)."],"richtig":0,"erklaerung":"Die gezahlte Grundsteuer für betriebliche Grundstücke kann vom Gewerbeertrag gekürzt werden (§ 9 GewStG)."},{"id":1456,"gesetz":"GewStG","frage":"#1456 Wie wird die Gewerbesteuer berechnet?","antworten":["Der Gewerbeertrag wird mit der Steuermesszahl von 3,1 % multipliziert und dann mit dem Hebesatz der Gemeinde verrechnet (§ 11 GewStG).","Der Gewerbeertrag wird mit der Steuermesszahl von 3,15 % multipliziert und dann mit dem Hebesatz der Gemeinde verrechnet (§ 11 GewStG).","Der Gewerbeertrag wird mit der Steuermesszahl von 3,5 % multipliziert und dann mit dem Hebesatz der Gemeinde verrechnet (§ 11 GewStG)."],"richtig":2,"erklaerung":"Der Gewerbeertrag wird mit der Steuermesszahl von 3,5 % multipliziert und dann mit dem Hebesatz der Gemeinde verrechnet (§ 11 GewStG)."},{"id":1457,"gesetz":"GewStG","frage":"#1457 Wie hoch ist der Mindesthebesatz für die Gewerbesteuer?","antworten":["Der Mindesthebesatz beträgt 210 %, kann aber von jeder Gemeinde individuell festgelegt werden (§ 16 GewStG).","Der Mindesthebesatz beträgt 190 %, kann aber von jeder Gemeinde individuell festgelegt werden (§ 16 GewStG).","Der Mindesthebesatz beträgt 200 %, kann aber von jeder Gemeinde individuell festgelegt werden (§ 16 GewStG)."],"richtig":2,"erklaerung":"Der Mindesthebesatz beträgt 200 %, kann aber von jeder Gemeinde individuell festgelegt werden (§ 16 GewStG)."},{"id":1458,"gesetz":"GewStG","frage":"#1458 Welche Steuererleichterungen gibt es für Taxiunternehmen?","antworten":["Es gibt keine speziellen Steuererleichterungen für Taxiunternehmen, aber sie können allgemeine gewerbesteuerliche Kürzungen nutzen (§ 9 GewStG).","In vierteljährlichen Vorauszahlungen am 15. Februar, 15. Mai, 15. August und 15. November (§ 19 GewStG).","Die gezahlte Grundsteuer für betriebliche Grundstücke kann vom Gewerbeertrag gekürzt werden (§ 9 GewStG)."],"richtig":0,"erklaerung":"Es gibt keine speziellen Steuererleichterungen für Taxiunternehmen, aber sie können allgemeine gewerbesteuerliche Kürzungen nutzen (§ 9 GewStG)."},{"id":1459,"gesetz":"GewStG","frage":"#1459 Sind nebenberufliche Taxiunternehmer gewerbesteuerpflichtig?","antworten":["Ja, wenn die Einkünfte die Freigrenze von 24.500 € überschreiten (§ 11 GewStG).","Nein, wenn die Einkünfte die Freigrenze von 24.500 € überschreiten (§ 11 GewStG).","Die Gewerbesteuer wird in der Gemeinde erhoben, in der sich die Betriebsstätte befindet (§ 4 GewStG)."],"richtig":0,"erklaerung":"Ja, wenn die Einkünfte die Freigrenze von 24.500 € überschreiten (§ 11 GewStG)."},{"id":1460,"gesetz":"GewStG","frage":"#1460 Welche Auswirkungen hat die Gewerbesteuerpflicht auf Mietwagenunternehmen?","antworten":["Nein, aber Elektro-Taxis können über andere Steuererleichterungen wie die Kfz-Steuerbefreiung profitieren.","Taxenunternehmen müssen Gewerbesteuer zahlen, auch wenn sie keine Sonderregelungen wie Taxis haben (§ 2 GewStG).","Mietwagenunternehmen müssen Gewerbesteuer zahlen, auch wenn sie keine Sonderregelungen wie Taxis haben (§ 2 GewStG)."],"richtig":2,"erklaerung":"Mietwagenunternehmen müssen Gewerbesteuer zahlen, auch wenn sie keine Sonderregelungen wie Taxis haben (§ 2 GewStG)."},{"id":1461,"gesetz":"GewStG","frage":"#1461 Welche Bedeutung hat die Betriebsstätte für die Gewerbesteuer?","antworten":["Die Gewerbesteuer wird in der Gemeinde erhoben, in der sich die Betriebsstätte befindet (§ 4 GewStG).","Ja, wenn die Einkünfte die Freigrenze von 24.500 € überschreiten (§ 11 GewStG).","Ja, jedes Unternehmen mit Gewerbesteuerpflicht muss eine Steuererklärung einreichen (§ 14a GewStG)."],"richtig":0,"erklaerung":"Die Gewerbesteuer wird in der Gemeinde erhoben, in der sich die Betriebsstätte befindet (§ 4 GewStG)."},{"id":1462,"gesetz":"GewStG","frage":"#1462 Wann endet die Gewerbesteuerpflicht für ein Taxiunternehmen?","antworten":["Mit der Aufgabe oder Abmeldung des Gewerbes beim Finanzamt und der Gemeinde (§ 18 GewStG).","Ja, durch strategische Kürzungen und Gestaltungsmöglichkeiten (§ 9 GewStG).","Der Gewerbeertrag des fusionierten Unternehmens wird neu berechnet (§ 7 GewStG)."],"richtig":0,"erklaerung":"Mit der Aufgabe oder Abmeldung des Gewerbes beim Finanzamt und der Gemeinde (§ 18 GewStG)."},{"id":1463,"gesetz":"GewStG","frage":"#1463 Wie werden Leasingfahrzeuge gewerbesteuerlich behandelt?","antworten":["Ja, wenn sie den Gewinn des Unternehmens erhöhen (§ 7 GewStG).","Ein Teil der Miet-, Pacht- und Leasingaufwendungen sowie Zinsen auf betriebliche Schulden werden dem Gewinn wieder hinzugerechnet (§ 8 GewStG).","Ein Teil der Leasingraten wird dem Gewinn wieder hinzugerechnet (§ 8 GewStG)."],"richtig":2,"erklaerung":"Ein Teil der Leasingraten wird dem Gewinn wieder hinzugerechnet (§ 8 GewStG)."},{"id":1464,"gesetz":"GewStG","frage":"#1464 Welche Rolle spielt die Stadt oder Gemeinde bei der Gewerbesteuer?","antworten":["Ja, wenn die Einkünfte die Freigrenze von 24.500 € überschreiten (§ 11 GewStG).","Es können Säumniszuschläge und Vollstreckungsmaßnahmen durch die Gemeinde erfolgen (§ 14b GewStG).","Die Gemeinde legt den Hebesatz fest und erhebt die Gewerbesteuer (§ 16 GewStG)."],"richtig":2,"erklaerung":"Die Gemeinde legt den Hebesatz fest und erhebt die Gewerbesteuer (§ 16 GewStG)."},{"id":1465,"gesetz":"GewStG","frage":"#1465 Wie oft muss die Gewerbesteuer gezahlt werden?","antworten":["Der Mindesthebesatz beträgt 200 %, kann aber von jeder Gemeinde individuell festgelegt werden (§ 16 GewStG).","Der Steuermessbetrag ist die Basis für die Berechnung der endgültigen Gewerbesteuer (§ 11 GewStG).","In vierteljährlichen Vorauszahlungen am 15. Februar, 15. Mai, 15. August und 15. November (§ 19 GewStG)."],"richtig":2,"erklaerung":"In vierteljährlichen Vorauszahlungen am 15. Februar, 15. Mai, 15. August und 15. November (§ 19 GewStG)."},{"id":1466,"gesetz":"GewStG","frage":"#1466 Was passiert, wenn ein Taxiunternehmen zu hohe Gewerbesteuer gezahlt hat?","antworten":["Ja, wenn die Einkünfte die Freigrenze von 24.500 € überschreiten (§ 11 GewStG).","Ja, jedes Unternehmen mit Gewerbesteuerpflicht muss eine Steuererklärung einreichen (§ 14a GewStG).","Es erfolgt eine Erstattung nach der Steuererklärung (§ 20 GewStG)."],"richtig":2,"erklaerung":"Es erfolgt eine Erstattung nach der Steuererklärung (§ 20 GewStG)."},{"id":1467,"gesetz":"GewStG","frage":"#1467 Muss ein Taxiunternehmen eine Gewerbesteuererklärung abgeben?","antworten":["Ja, jedes Unternehmen mit Gewerbesteuerpflicht muss eine Steuererklärung einreichen (§ 14a GewStG).","Es erfolgt eine Erstattung nach der Steuererklärung (§ 20 GewStG).","Nein, jedes Unternehmen mit Gewerbesteuerpflicht muss eine Steuererklärung einreichen (§ 14a GewStG)."],"richtig":0,"erklaerung":"Ja, jedes Unternehmen mit Gewerbesteuerpflicht muss eine Steuererklärung einreichen (§ 14a GewStG)."},{"id":1468,"gesetz":"GewStG","frage":"#1468 Gibt es steuerliche Vorteile für Elektro-Taxis in der Gewerbesteuer?","antworten":["Ja, aber Elektro-Taxis können über andere Steuererleichterungen wie die Kfz-Steuerbefreiung profitieren.","Nein, aber Elektro-Taxis können über andere Steuererleichterungen wie die Kfz-Steuerbefreiung profitieren.","Die Steuer wird anteilig auf die Gemeinden aufgeteilt, in denen das Unternehmen tätig ist (§ 28 GewStG)."],"richtig":1,"erklaerung":"Nein, aber Elektro-Taxis können ü ntlichen Vertragsbestandteile (Vergütung, Tätigkeit) geeinigt haben (§ 611a BGB).","Wenn sich Arbeitnehmer und Arbeitnehmer über die wesentlichen Vertragsbestandteile (Vergütung, Tätigkeit) geeinigt haben (§ 611a BGB).","Wenn sich Arbeitgeber und Arbeitgeber über die wesentlichen Vertragsbestandteile (Vergütung, Tätigkeit) geeinigt haben (§ 611a BGB)."],"richtig":0,"erklaerung":"Wenn sich Arbeitgeber und Arbeitnehmer über die wesentlichen Vertragsbestandteile (Vergütung, Tätigkeit) geeinigt haben (§ 611a BGB)."},{"id":1162,"gesetz":"BGB","frage":"#1162 Wann hat ein Arbeitnehmer Anspruch auf eine Abfindung nach einer Kündigung?","antworten":["Falls keine feste Vergütung vereinbart wurde, gilt die übliche Vergütung (§ 612 BGB).","Nein, es sei denn, der Arbeitsvertrag oder eine betriebliche Regelung erlaubt dies (§ 315 BGB).","Wenn eine betriebsbedingte Kündigung mit einem Abfindungsangebot verbunden ist (§ 1a KSchG)."],"richtig":2,"erklaerung":"Wenn eine betriebsbedingte Kündigung mit einem Abfindungsangebot verbunden ist (§ 1a KSchG)."},{"id":1163,"gesetz":"BGB","frage":"#1163 Welche Rechte hat ein Arbeitnehmer bei einer fristlosen Kündigung?","antworten":["Ein Arbeitsvertrag verpflichtet zur persönlichen Arbeitsleistung, während ein Werkvertrag ein bestimmtes Ergebnis schuldet (§ 631 BGB).","Nein, es sei denn, der Arbeitsvertrag oder eine betriebliche Regelung erlaubt dies (§ 315 BGB).","Er kann innerhalb von drei Wochen Kündigungsschutzklage beim Arbeitsgericht einreichen (§ 623 BGB)."],"richtig":2,"erklaerung":"Er kann innerhalb von drei Wochen Kündigungsschutzklage beim Arbeitsgericht einreichen (§ 623 BGB)."},{"id":1164,"gesetz":"BGB","frage":"#1164 Welche Mindestanforderungen muss ein Arbeitszeugnis erfüllen?","antworten":["Ein Arbeitsvertrag verpflichtet zur persönlichen Arbeitsleistung, während ein Werkvertrag ein bestimmtes Ergebnis schuldet (§ 631 BGB).","Bei grober Fahrlässigkeit oder Vorsatz (§ 823 BGB), in anderen Fällen kann eine Haftungserleichterung b t, Elternzeit) oder mit Zustimmung des Arbeitgebers (§ 616 BGB).","Ein Arbeitsvertrag verpflichtet zur persönlichen Arbeitsleistung, während ein Werkvertrag ein bestimmtes Ergebnis schuldet (§ 631 BGB)."],"richtig":0,"erklaerung":"Sie darf maximal sechs Monate betragen (§ 622 Abs. 3 BGB)."},{"id":1169,"gesetz":"BGB","frage":"#1169 Was passiert, wenn ein Arbeitnehmer ohne gültigen Grund nicht zur Arbeit erscheint?","antworten":["Wenn der Arbeitnehmer vorsätzlich oder grob fahrlässig einen Schaden verursacht hat (§ 280 BGB).","Nein, es sei denn, der Arbeitsvertrag oder eine betriebliche Regelung erlaubt dies (§ 315 BGB).","Dies kann eine Abmahnung oder in wiederholten Fällen eine Kündigung zur Folge haben (§ 626 BGB)."],"richtig":2,"erklaerung":"Dies kann eine Abmahnung oder in wiederholten Fällen eine Kündigung zur Folge haben (§ 626 BGB)."},{"id":1170,"gesetz":"BGB","frage":"#1170 Unter welchen Umständen kann ein Arbeitnehmer eine unbezahlte Freistellung verlangen?","antworten":["Nur bei gesetzlichem Anspruch (z. B. Pflegezeit, Elternzeit) oder mit Zustimmung des Arbeitnehmers (§ 616 BGB).","Nur bei gesetzlichem Anspruch (z. B. Pflegezeit, Elternzeit) oder mit Zustimmung des Arbeitgebers (§ 616 BGB).","Wenn eine betriebsbedingte Kündigung mit einem Abfindungsangebot verbunden ist (§ 1a KSchG)."],"richtig":1,"erklaerung":"Nur bei gesetzlichem Anspruch (z. B. Pflegezeit, Elternzeit) oder mit Zustimmung des Arbeitgebers (§ 616 BGB)."},{"id":1171,"gesetz":"BGB","frage":"#1171 Was ist der Unterschied zwischen einem Werkvertrag und einem Arbeitsvertrag?","antworten":["Wenn der Arbeitnehmer vorsätzlich oder grob fahrlässig einen Schaden verursacht hat (§ 280 BGB).","Ein Arbeitsvertrag verpflichtet zur persönlichen Arbeitsleistung, während ein Werkvertrag ein bestimmtes Ergebnis schuldet (§ 631 BGB).","Wenn eine betriebsbedingte Kündigung mit einem Abfindungsangebot verbunden ist (§ 1a KSchG)."],"richtig":1,"erklaerung":"Ein Arbeitsvertrag verpflichtet zur persönlichen Arbeitsleistung, während ein Werkvertrag ein bestimmtes Ergebnis schuldet (§ 631 BGB)."},{"id":1172,"gesetz":"BGB","frage":"#1172 Wann haftet ein Arbeitnehmer für Schäden, die er während der Arbeit verursacht?","antworten":["Falls keine feste Vergütung vereinbart wurde, gilt die übliche Vergütung (§ 612 BGB).","Bei grober Fahrlässigkeit oder Vorsatz (§ 823 BGB), in anderen Fällen kann eine Haftungserleichterung bestehen.","Wenn eine betriebsbedingte Kündigung mit einem Abfindungsangebot verbunden ist (§ 1a KSchG)."],"richtig":1,"erklaerung":"Bei grober Fahrlässigkeit oder Vorsatz (§ 823 BGB), in anderen Fällen kann eine Haftungserleichterung bestehen."},{"id":1173,"gesetz":"BGB","frage":"#1173 Darf ein Arbeitnehmer während der Arbeitszeit für ein Konkurrenzunternehmen arbeiten?","antworten":["Nein, dies verstößt gegen die Treuepflicht und kann zur Kündigung führen (§ 60 HGB).","Nein, die Arbeitsleistung muss persönlich erbracht werden, sofern keine andere Regelung getroffen wurde (§ 613 BGB).","Ja, dies verstößt gegen die Treuepflicht und kann zur Kündigung führen (§ 60 HGB)."],"richtig":0,"erklaerung":"Nein, dies verstößt gegen die Treuepflicht und kann zur Kündigung führen (§ 60 HGB)."},{"id":1174,"gesetz":"BGB","frage":"#1174 Unter welchen Bedingungen kann ein Arbeitgeber Schadensersatz vom Arbeitnehmer fordern?","antworten":["Wenn der Arbeitgeber vorsätzlich oder grob fahrlässig einen Schaden verursacht hat (§ 280 BGB).","Wartezeiten gelten als Arbeitszeit und müssen vergütet werden, sofern sie arbeitsvertraglich oder gesetzlich als Teil der Arbeitszeit gelten (§ 611a BGB).","Wenn der Arbeitnehmer vorsätzlich oder grob fahrlässig einen Schaden verursacht hat (§ 280 BGB)."],"richtig":2,"erklaerung":"Wenn der Arbeitnehmer vorsätzlich oder grob fahrlässig einen Schaden verursacht hat (§ 280 BGB)."},{"id":1175,"gesetz":"BGB","frage":"#1175 Wie lange ist die gesetzliche Gewährleistungsfrist für Dienstleistungen nach BGB?","antworten":["Zwei Jahre, sofern nichts anderes vereinbart wurde (§ 634a BGB).","Sie darf maximal sechs Monate betragen (§ 622 Abs. 3 BGB).","Es muss klar, wahrheitsgemäß und wohlwollend formuliert sein (§ 109 GewO)."],"richtig":0,"erklaerung":"Zwei Jahre, sofern nichts anderes vereinbart wurde (§ 634a BGB)."},{"id":1176,"gesetz":"BGB","frage":"#1176 Wann kann ein Vertrag wegen Irrtums angefochten werden?","antworten":["Wenn sich eine Partei über wesentliche Vertragsbestandteile geirrt hat (§ 119 BGB).","Wenn der Arbeitnehmer vorsätzlich oder grob fahrlässig einen Schaden verursacht hat (§ 280 BGB).","Wenn sie überraschende oder unangemessene Klauseln enthalten (§ 307 BGB)."],"richtig":0,"erklaerung":"Wenn sich eine Partei über wesentliche Vertragsbestandteile geirrt hat (§ 119 BGB)."},{"id":1177,"gesetz":"BGB","frage":"#1177 Welche Bedeutung hat die „geschäftliche Unerfahrenheit“ bei Verträgen?","antworten":["Verträge können unwirksam sein, wenn eine Partei aufgrund ihrer Unerfahrenheit übervorteilt wurde (§ 138 BGB).","Nein, Arbeitszeiten müssen vergütet werden, wenn sie arbeitsrechtlich als Arbeitszeit zählen (§ 612a BGB).","Wenn eine betriebsbedingte Kündigung mit einem Abfindungsangebot verbunden ist (§ 1a KSchG)."],"richtig":0,"erklaerung":"Verträge können unwirksam sein, wenn eine Partei aufgrund ihrer Unerfahrenheit übervorteilt wurde (§ 138 BGB)."},{"id":1178,"gesetz":"BGB","frage":"#1178 Wann sind Allgemeine Geschäftsbedingungen (AGB) unwirksam?","antworten":["Wenn eine betriebsbedingte Kündigung mit einem Abfindungsangebot verbunden ist (§ 1a KSchG).","Nein, es sei denn, der Arbeitsvertrag oder eine betriebliche Regelung erlaubt dies (§ 315 BGB).","Wenn sie überraschende oder unangemessene Klauseln enthalten (§ 307 BGB)."],"richtig":2,"erklaerung":"Wenn sie überraschende oder unangemessene Klauseln enthalten (§ 307 BGB)."},{"id":1179,"gesetz":"BGB","frage":"#1179 Welche Formvorschriften gelten für Arbeitsverträge?","antworten":["Ein Arbeitsvertrag kann schriftlich oder schriftlich geschlossen werden, jedoch müssen die wesentlichen Bedingungen schriftlich festgehalten werden (§ 2 NachwG).","Ein Arbeitsvertrag kann mündlich oder schriftlich geschlossen werden, jedoch müssen die wesentlichen Bedingungen schriftlich festgehalten werden (§ 2 NachwG).","Ein Arbeitsvertrag kann mündlich oder mündlich geschlossen werden, jedoch müssen die wesentlichen Bedingungen schriftlich festgehalten werden (§ 2 NachwG)."],"richtig":1,"erklaerung":"Ein Arbeitsvertrag kann mündlich oder schriftlich geschlossen werden, jedoch müssen die wesentlichen Bedingungen schriftlich festgehalten werden (§ 2 NachwG)."},{"id":1180,"gesetz":"BGB","frage":"#1180 Was passiert, wenn ein Arbeitnehmer seine Pflichten aus dem Arbeitsvertrag nicht erfüllt?","antworten":["Nein, Arbeitszeiten müssen vergütet werden, wenn sie arbeitsrechtlich als Arbeitszeit zählen (§ 612a BGB).","Der Arbeitnehmer kann Abmahnungen erteilen oder im Wiederholungsfall eine Kündigung aussprechen (§ 626 BGB).","Der Arbeitgeber kann Abmahnungen erteilen oder im Wiederholungsfall eine Kündigung aussprechen (§ 626 BGB)."],"richtig":2,"erklaerung":"Der Arbeitgeber kann Abmahnungen erteilen oder im Wiederholungsfall eine Kündigung aussprechen (§ 626 BGB)."},{"id":1181,"gesetz":"BGB","frage":"#1181","antworten":["","Wenn sie überraschende oder unangemessene Klauseln enthalten (§ 307 BGB).","Nach drei Jahren gemäß § 195 BGB."],"richtig":0,"erklaerung":""},{"id":1201,"gesetz":"HGB_BGB","frage":"#1201 Gilt ein Taxiunternehmen als Kaufmann im Sinne des HGB?","antworten":["Der Arbeitgeber muss sechs Wochen lang Entgeltfortzahlung leisten (§ 3 EFZG).","Nein, wenn es ein Handelsgewerbe betreibt oder im Handelsregister eingetragen ist (§ 1 HGB).","Ja, wenn es ein Handelsgewerbe betreibt oder im Handelsregister eingetragen ist (§ 1 HGB)."],"richtig":2,"erklaerung":"Ja, wenn es ein Handelsgewerbe betreibt oder im Handelsregister eingetragen ist (§ 1 HGB)."},{"id":1202,"gesetz":"HGB_BGB","frage":"#1202 Welche Bedeutung hat die Handelsregistereintragung für ein Taxiunternehmen?","antworten":["Er muss Bücher führen, eine Bilanz aufstellen und sich an kaufmännische Sorgfaltspflichten halten (§§ 238, 243 HGB).","Sie bewirkt, dass das Unternehmen automatisch als Kaufmann gilt und den Vorschriften des HGB unterliegt (§ 2 HGB).","Wenn es von mehreren Kaufleuten gemeinsam geführt wird und im Handelsregister eingetragen ist (§ 6 HGB)."],"richtig":1,"erklaerung":"Sie bewirkt, dass das Unternehmen automatisch als Kaufmann gilt und den Vorschriften des HGB unterliegt (§ 2 HGB)."},{"id":1203,"gesetz":"HGB_BGB","frage":"#1203 Welche Pflichten hat ein Taxiunternehmer als Kaufmann?","antworten":["Sie bewirkt, dass das Unternehmen automatisch als Kaufmann gilt und den Vorschriften des HGB unterliegt (§ 2 HGB).","Es gelten die allgemeinen Buchführungspflichten nach HGB und UStG (§ 238 HGB).","Er muss Bücher führen, eine Bilanz aufstellen und sich an kaufmännische Sorgfaltspflichten halten (§§ 238, 243 HGB)."],"richtig":2,"erklaerung":"Er muss Bücher führen, eine Bilanz aufstellen und sich an kaufmännische Sorgfaltspflichten halten (§§ 238, 243 HGB)."},{"id":1204,"gesetz":"HGB_BGB","frage":"#1204 Wie unterscheidet sich ein Gewerbetreibender von einem Kaufmann im Taxi- und Mietwagengewerbe?","antworten":["Sie bewirkt, dass das Unternehmen automatisch als Kaufmann gilt und den Vorschriften des HGB unterliegt (§ 2 HGB).","Es gelten die allgemeinen Buchführungspflichten nach HGB und UStG (§ 238 HGB).","Ein Kaufmann unterliegt den Vorschriften des HGB, während ein Gewerbetreibender nach GewO und BGB behandelt wird."],"richtig":2,"erklaerung":"Ein Kaufmann unterliegt den Vorschriften des HGB, während ein Gewerbetreibender nach GewO und BGB behandelt wird."},{"id":1205,"gesetz":"HGB_BGB","frage":"#1205 Muss ein Taxiunternehmen ein kaufmännisch eingerichtetes Geschäft führen?","antworten":["Zahlung der Vergütung, Fürsorgepflicht, Schutzmaßnahmen nach ArbSchG (§ 241 Abs. 2 BGB).","Ja, aber die Firma muss unterscheidungskräftig sein und darf nicht irreführend wirken (§ 18 HGB).","Nur, wenn der Betrieb nach Art und Umfang einen kaufmännischen Geschäftsbetrieb erfordert (§ 1 Abs. 2 HGB)."],"richtig":2,"erklaerung":"Nur, wenn der Betrieb nach Art und Umfang einen kaufmännischen Geschäftsbetrieb erfordert (§ 1 Abs. 2 HGB)."},{"id":1206,"gesetz":"HGB_BGB","frage":"#1206 Welche Regelungen gelten für den Geschäftsverkehr eines Taxiunternehmens mit Fahrgästen?","antworten":["Der Unternehmer verliert die Verfügung über sein Vermögen, das Insolvenzgericht übernimmt die Verwaltung (§ 17 InsO).","Alle Arbeitsverhältnisse gehen auf den neuen Inhaber über (§ 613a BGB).","Die Beförderung basiert auf einem Beförderungsvertrag, der nach BGB und PBefG geregelt ist."],"richtig":2,"erklaerung":"Die Beförderung basiert auf einem Beförderungsvertrag, der nach BGB und PBefG geregelt ist."},{"id":1207,"gesetz":"HGB_BGB","frage":"#1207 Welche Auswirkungen hat eine fehlerhafte Rechnung eines Taxiunternehmens?","antworten":["Eine fehlerhafte Rechnung kann nachträglich korrigiert werden, jedoch haftet der Fahrer für Fehler (§ 14 UStG).","Es dokumentiert die wichtigsten rechtlichen Tatsachen über das Unternehmen (§ 8 HGB).","Eine fehlerhafte Rechnung kann nachträglich korrigiert werden, jedoch haftet der Unternehmer für Fehler (§ 14 UStG)."],"richtig":2,"erklaerung":"Eine fehlerhafte Rechnung kann nachträglich korrigiert werden, jedoch haftet der Unternehmer für Fehler (§ 14 UStG)."},{"id":1208,"gesetz":"HGB_BGB","frage":"#1208 Darf ein Taxiunternehmen eine andere Firma führen als seinen eigenen Namen?","antworten":["Die Haftung ist auf das Gesellschaftsvermögen begrenzt (§ 13 GmbHG).","Ja, aber die Firma muss unterscheidungskräftig sein und darf nicht irreführend wirken (§ 18 HGB).","Nein, aber die Firma muss unterscheidungskräftig sein und darf nicht irreführend wirken (§ 18 HGB)."],"richtig":1,"erklaerung":"Ja, aber die Firma muss unterscheidungskräftig sein und darf nicht irreführend wirken (§ 18 HGB)."},{"id":1209,"gesetz":"HGB_BGB","frage":"#1209 Welche Haftung trifft den Unternehmer im Taxi- und Mietwagengewerbe?","antworten":["Der Unternehmer haftet persönlich und unbeschränkt für alle Verbindlichkeiten (§ 13 HGB).","Der Fahrer haftet persönlich und unbeschränkt für alle Verbindlichkeiten (§ 13 HGB).","Die Beförderung basiert auf einem Beförderungsvertrag, der nach BGB und PBefG geregelt ist."],"richtig":0,"erklaerung":"Der Unternehmer haftet persönlich und unbeschränkt für alle Verbindlichkeiten (§ 13 HGB)."},{"id":1210,"gesetz":"HGB_BGB","frage":"#1210 Darf ein Taxiunternehmen mehrere Geschäftsadressen führen?","antworten":["Nein, aber der Hauptsitz muss ins Handelsregister eingetragen werden (§ 29 HGB).","Ja, aber der Hauptsitz muss ins Handelsregister eingetragen werden (§ 29 HGB).","Er muss Arbeitszeiten, Löhne und Sozialversicherungsabgaben dokumentieren (§ 238 HGB)."],"richtig":1,"erklaerung":"Ja, aber der Hauptsitz muss ins Handelsregister eingetragen werden (§ 29 HGB)."},{"id":1211,"gesetz":"HGB_BGB","frage":"#1211 Gilt das HGB für das Arbeitsverhältnis von Taxi- und Mietwagenfahrern?","antworten":["Nein, das Arbeitsrecht richtet sich nach dem BGB (§ 611a BGB) und dem Arbeitsrecht.","Eine fehlerhafte Rechnung kann nachträglich korrigiert werden, jedoch haftet der Unternehmer für Fehler (§ 14 UStG).","Ja, das Arbeitsrecht richtet sich nach dem BGB (§ 611a BGB) und dem Arbeitsrecht."],"richtig":0,"erklaerung":"Nein, das Arbeitsrecht richtet sich nach dem BGB (§ 611a BGB) und dem Arbeitsrecht."},{"id":1212,"gesetz":"HGB_BGB","frage":"#1212 Welche Pflichten hat der Arbeitgeber gegenüber seinen Fahrern nach HGB und BGB?","antworten":["Ja, wenn sie nicht weisungsgebunden sind; ansonsten handelt es sich um Scheinselbstständigkeit (§ 84 HGB).","Zahlung der Vergütung, Fürsorgepflicht, Schutzmaßnahmen nach ArbSchG (§ 241 Abs. 2 BGB).","Nein, das Arbeitsrecht richtet sich nach dem BGB (§ 611a BGB) und dem Arbeitsrecht."],"richtig":1,"erklaerung":"Zahlung der Vergütung, Fürsorgepfl en neuen Inhaber über (§ 613a BGB)."},{"id":1217,"gesetz":"HGB_BGB","frage":"#1217 Kann ein Taxiunternehmen Fahrer als freie Mitarbeiter beschäftigen?","antworten":["Der Arbeitgeber muss sechs Wochen lang Entgeltfortzahlung leisten (§ 3 EFZG).","Nein, wenn sie nicht weisungsgebunden sind; ansonsten handelt es sich um Scheinselbstständigkeit (§ 84 HGB).","Ja, wenn sie nicht weisungsgebunden sind; ansonsten handelt es sich um Scheinselbstständigkeit (§ 84 HGB)."],"richtig":2,"erklaerung":"Ja, wenn sie nicht weisungsgebunden sind; ansonsten handelt es sich um Scheinselbstständigkeit (§ 84 HGB)."},{"id":1218,"gesetz":"HGB_BGB","frage":"#1218 Welche Regelungen gibt es für den Krankheitsfall eines Taxifahrers?","antworten":["Der Arbeitgeber muss sechs Wochen lang Entgeltfortzahlung leisten (§ 3 EFZG).","Bei grober Fahrlässigkeit oder Vorsatz (§ 823 BGB).","Der Arbeitnehmer muss sechs Wochen lang Entgeltfortzahlung leisten (§ 3 EFZG)."],"richtig":0,"erklaerung":"Der Arbeitgeber muss sechs Wochen lang Entgeltfortzahlung leisten (§ 3 EFZG)."},{"id":1219,"gesetz":"HGB_BGB","frage":"#1219 Wann haftet ein Taxifahrer für Schäden am Fahrzeug?","antworten":["Er muss Bücher führen, eine Bilanz aufstellen und sich an kaufmännische Sorgfaltspflichten halten (§§ 238, 243 HGB).","Bei grober Fahrlässigkeit oder Vorsatz (§ 823 BGB).","Nein, das Arbeitsrecht richtet sich nach dem BGB (§ 611a BGB) und dem Arbeitsrecht."],"richtig":1,"erklaerung":"Bei grober Fahrlässigkeit oder Vorsatz (§ 823 BGB)."},{"id":1220,"gesetz":"HGB_BGB","frage":"#1220 Welche Dokumentationspflichten hat ein Taxiunternehmer bezüglich seiner Arbeitnehmer?","antworten":["Er muss Arbeitszeiten, Löhne und Sozialversicherungsabgaben dokumentieren (§ 238 HGB).","Es gelten die allgemeinen Buchführungspflichten nach HGB und UStG (§ 238 HGB).","Ja, wenn er als Kaufmann im Handelsregister eingetragen ist (§ 242 HGB)."],"richtig":0,"erklaerung":"Er muss Arbeitszeiten, Löhne und Sozialversicherungsabgaben dokumentieren (§ 238 H ert die wichtigsten rechtlichen Tatsachen über das Unternehmen (§ 8 HGB)."},{"id":1229,"gesetz":"HGB_BGB","frage":"#1229 Kann ein Taxiunternehmen einen Handelsvertreter beschäftigen?","antworten":["Ja, der Handelsvertreter vermittelt Fahrdienste und erhält Provision (§ 84 HGB).","Nein, der Handelsvertreter vermittelt Fahrdienste und erhält Provision (§ 84 HGB).","Eine fehlerhafte Rechnung kann nachträglich korrigiert werden, jedoch haftet der Unternehmer für Fehler (§ 14 UStG)."],"richtig":0,"erklaerung":"Ja, der Handelsvertreter vermittelt Fahrdienste und erhält Provision (§ 84 HGB)."},{"id":1230,"gesetz":"HGB_BGB","frage":"#1230 Welche Folgen hat eine Insolvenz eines Taxiunternehmens?","antworten":["Der Unternehmer verliert die Verfügung über sein Vermögen, das Insolvenzgericht übernimmt die Verwaltung (§ 17 InsO).","Der Fahrer verliert die Verfügung über sein Vermögen, das Insolvenzgericht übernimmt die Verwaltung (§ 17 InsO).","Er muss Arbeitszeiten, Löhne und Sozialversicherungsabgaben dokumentieren (§ 238 HGB)."],"richtig":0,"erklaerung":"Der Unternehmer verliert die Verfügung über sein Vermögen, das Insolvenzgericht übernimmt die Verwaltung (§ 17 InsO)."},{"id":1231,"gesetz":"HGB_BGB","frage":"#1231","antworten":["Alle Arbeitsverhältnisse gehen auf den neuen Inhaber über (§ 613a BGB).","","Die Beförderung basiert auf einem Beförderungsvertrag, der nach BGB und PBefG geregelt ist."],"richtig":1,"erklaerung":""},{"id":1251,"gesetz":"UStG","frage":"#1251 Welche steuerlichen Regelungen gelten für Taxiunternehmen hinsichtlich der Umsatzsteuer?","antworten":["Fahrten über eine Entfernung von mehr als 50 km oder Fahrten, die nicht innerhalb einer Gemeinde erfolgen, unterliegen dem regulären Steuersatz von 19 % (§ 12 UStG).","Taxiunternehmen unterliegen der Umsatzsteuerpflicht und müssen je nach Leistungsart den regulären oder ermäßigten Steuersatz anwenden (§ 1 UStG).","Taxiunternehmen unterliegen der Vorsteuerpflicht und müssen je nach Leistungsart den regulären od ung":"Wenn es sich für die Versteuerung nach vereinbarten Entgelten entscheidet (§ 16 UStG)."},{"id":1268,"gesetz":"UStG","frage":"#1268 Darf ein Taxiunternehmen die Umsatzsteuer auf Fahrten ins Ausland erheben?","antworten":["Nein, internationale Beförderungsleistungen sind unter bestimmten Bedingungen steuerfrei (§ 4 UStG).","Nein, internationale Beförderungsleistungen sind unter bestimmten Bedingungen steuerpflichtig (§ 4 UStG).","Ja, internationale Beförderungsleistungen sind unter bestimmten Bedingungen steuerfrei (§ 4 UStG)."],"richtig":0,"erklaerung":"Nein, internationale Beförderungsleistungen sind unter bestimmten Bedingungen steuerfrei (§ 4 UStG)."},{"id":1269,"gesetz":"UStG","frage":"#1269 Welche steuerlichen Regelungen gelten für den Verkauf eines Taxi-Fahrzeugs?","antworten":["Der Verkauf unterliegt der Umsatzsteuer, sofern kein öffentlichverkauf vorliegt (§ 3 UStG).","Der Verkauf unterliegt der Vorsteuer, sofern kein Privatverkauf vorliegt (§ 3 UStG).","Der Verkauf unterliegt der Umsatzsteuer, sofern kein Privatverkauf vorliegt (§ 3 UStG)."],"richtig":2,"erklaerung":"Der Verkauf unterliegt der Umsatzsteuer, sofern kein Privatverkauf vorliegt (§ 3 UStG)."},{"id":1270,"gesetz":"UStG","frage":"#1270 Wie wird die Umsatzsteuer bei Leasingfahrzeugen für Taxiunternehmen behandelt?","antworten":["Die monatlichen Leasingraten enthalten Umsatzsteuer, die als Vorsteuer abziehbar ist (§ 15 UStG).","Die monatlichen Leasingraten enthalten Vorsteuer, die als Vorsteuer abziehbar ist (§ 15 UStG).","Die monatlichen Leasingraten enthalten Umsatzsteuer, die als Umsatzsteuer abziehbar ist (§ 15 UStG)."],"richtig":0,"erklaerung":"Die monatlichen Leasingraten enthalten Umsatzsteuer, die als Vorsteuer abziehbar ist (§ 15 UStG)."},{"id":1271,"gesetz":"UStG","frage":"#1271 Wie wird der Vorsteuerabzug bei gemischt genutzten Fahrzeugen im Taxi-Gewerbe geregelt?","antworten":["Der Umsatzsteuerabzug ist nur anteilig möglich, wenn das Fahrzeug privat und geschäftlich genutzt wird (§ 15 Abs. 1 UStG).","Der Vorsteuerabzug ist nur anteilig möglich, wenn das Fahrzeug privat und geschäftlich genutzt wird (§ 15 Abs. 1 UStG).","Der Vorsteuerabzug ist nur anteilig möglich, wenn das Fahrzeug öffentlich und geschäftlich genutzt wird (§ 15 Abs. 1 UStG)."],"richtig":1,"erklaerung":"Der Vorsteuerabzug ist nur anteilig möglich, wenn das Fahrzeug privat und geschäftlich genutzt wird (§ 15 Abs. 1 UStG)."},{"id":1272,"gesetz":"UStG","frage":"#1272 Wie werden Gutscheine für Taxifahrten umsatzsteuerlich behandelt?","antworten":["Einzweck-Gutscheine unterliegen bereits bei Ausgabe der Vorsteuer, Mehrzweck-Gutscheine erst bei Einlösung (§ 3 UStG).","Name und Anschrift des Unternehmers, Datum, Beförderungsstrecke, Umsatzsteuerbetrag und Steuersatz (§ 14 Abs. 4 UStG).","Einzweck-Gutscheine unterliegen bereits bei Ausgabe der Umsatzsteuer, Mehrzweck-Gutscheine erst bei Einlösung (§ 3 UStG)."],"richtig":2,"erklaerung":"Einzweck-Gutscheine unterliegen bereits bei Ausgabe der Umsatzsteuer, Mehrzweck-Gutscheine erst bei Einlösung (§ 3 UStG)."},{"id":1273,"gesetz":"UStG","frage":"#1273 Welche Umsatzsteuerregelungen gelten für die Personenbeförderung in Mietwagen?","antworten":["Mietwagenleistungen unterliegen grundsätzlich dem vollen Steuersatz von 19 % (§ 12 UStG).","Mietwagenleistungen unterliegen grundsätzlich dem vollen Steuersatz von 29 % (§ 12 UStG).","Mietwagenleistungen unterliegen grundsätzlich dem vollen Steuersatz von 9 % (§ 12 UStG)."],"richtig":0,"erklaerung":"Mietwagenleistungen unterliegen grundsätzlich dem vollen Steuersatz von 19 % (§ 12 UStG)."},{"id":1274,"gesetz":"UStG","frage":"#1274 Was passiert mit der Umsatzsteuer, wenn ein Taxiunternehmen steuerfreie Umsätze hat?","antworten":["Die monatlichen Leasingraten enthalten Umsatzsteuer, die als Vorsteuer abziehbar ist (§ 15 UStG).","Der Umsatzsteuerabzug kann anteilig entfallen (§ 15 Abs. 2 UStG).","Der Vorsteuerabzug kann anteilig entfallen (§ 15 Abs. 2 UStG)."],"richtig":2,"erklaerung":"Der Vorsteuerab i (§ 4 Nr. 17a UStG).","Sie sind unter bestimmten Bedingungen Vorsteuerfrei (§ 4 Nr. 17a UStG).","Sie sind unter bestimmten Bedingungen umsatzsteuerpflichtig (§ 4 Nr. 17a UStG)."],"richtig":0,"erklaerung":"Sie sind unter bestimmten Bedingungen umsatzsteuerfrei (§ 4 Nr. 17a UStG)."},{"id":1279,"gesetz":"UStG","frage":"#1279 Darf ein Taxiunternehmer ohne Umsatzsteuer arbeiten, wenn er für gemeinnützige Zwecke fährt?","antworten":["Ja, wenn die Fahrten von gemeinnützigen Organisationen beauftragt werden und steuerfrei sind (§ 4 Nr. 18 UStG).","Ja, wenn die Fahrten von gemeinnützigen Organisationen beauftragt werden und steuerpflichtig sind (§ 4 Nr. 18 UStG).","Nein, wenn die Fahrten von gemeinnützigen Organisationen beauftragt werden und steuerfrei sind (§ 4 Nr. 18 UStG)."],"richtig":0,"erklaerung":"Ja, wenn die Fahrten von gemeinnützigen Organisationen beauftragt werden und steuerfrei sind (§ 4 Nr. 18 UStG)."},{"id":1280,"gesetz":"UStG","frage":"#1280 Wie werden steuerliche Fehler bei der Umsatzsteuer bereinigt?","antworten":["Fehlerhafte Vorsteuervoranmeldungen müssen durch Berichtigung gemeldet werden (§ 17 UStG).","Fehlerhafte Umsatzsteuervoranmeldungen müssen durch Berichtigung gemeldet werden (§ 17 UStG).","Der Verkauf unterliegt der Umsatzsteuer, sofern kein Privatverkauf vorliegt (§ 3 UStG)."],"richtig":1,"erklaerung":"Fehlerhafte Umsatzsteuervoranmeldungen müssen durch Berichtigung gemeldet werden (§ 17 UStG)."},{"id":1281,"gesetz":"UStG","frage":"#1281","antworten":["Ja, wenn die Fahrten von gemeinnützigen Organisationen beauftragt werden und steuerfrei sind (§ 4 Nr. 18 UStG).","Die monatlichen Leasingraten enthalten Umsatzsteuer, die als Vorsteuer abziehbar ist (§ 15 UStG).",""],"richtig":2,"erklaerung":""},{"id":1301,"gesetz":"UStDV","frage":"#1301 Welche steuerlichen Vorschriften gelten für Taxi- und Mietwagenunternehmen laut UStDV?","antworten":["Die UStDV ergänzt das UStG und regelt die praktische Umsetzung der Vorsteuer, einschließlich Buchführung, Rech ht werden (§ 15 EStG).","Ja, Verluste können mit Gewinnen verrechnet oder vorgetragen werden (§ 10d EStG)."],"richtig":2,"erklaerung":"Ja, Verluste können mit Gewinnen verrechnet oder vorgetragen werden (§ 10d EStG)."},{"id":1428,"gesetz":"EStG","frage":"#1428 Welche steuerlichen Pflichten bestehen bei einem Wechsel von Taxifahrzeug auf Mietwagenbetrieb?","antworten":["Es erfolgt ggf. eine andere gewerbesteuerliche Behandlung (§ 15 EStG).","Steuerliche Abschreibungen und mögliche Sonderabschreibungen (§ 7c EStG).","Schuldzinsen sind nur eingeschränkt als Betriebsausgaben abziehbar (§ 4 Abs. 4a EStG)."],"richtig":0,"erklaerung":"Es erfolgt ggf. eine andere gewerbesteuerliche Behandlung (§ 15 EStG)."},{"id":1429,"gesetz":"EStG","frage":"#1429 Wie wirkt sich die Anschaffung eines neuen Fahrzeugs auf die Steuer aus?","antworten":["Die normale Nutzungsdauer beträgt 6 Jahre, aber Sonderabschreibungen sind möglich (§ 7 Abs. 1 EStG).","Das Fahrzeug kann abgeschrieben werden (§ 7 EStG).","Nein, freiwillige Trinkgelder sind steuerfrei (§ 3 Nr. 51 EStG)."],"richtig":1,"erklaerung":"Das Fahrzeug kann abgeschrieben werden (§ 7 EStG)."},{"id":1430,"gesetz":"EStG","frage":"#1430 Wie lange müssen steuerliche Unterlagen von Taxiunternehmen aufbewahrt werden?","antworten":["Grundsätzlich 15 Jahre (§ 147 AO).","Grundsätzlich 10 Jahre (§ 147 AO).","Grundsätzlich 5 Jahre (§ 147 AO)."],"richtig":1,"erklaerung":"Grundsätzlich 10 Jahre (§ 147 AO)."},{"id":1431,"gesetz":"EStG","frage":"#1431","antworten":["Der Gewinn aus dem Verkauf ist steuerpflichtig (§ 16 EStG).","Schuldzinsen sind nur eingeschränkt als Betriebsausgaben abziehbar (§ 4 Abs. 4a EStG).",""],"richtig":2,"erklaerung":""}];

// Schwierigkeit zuweisen (je 1/3)
const sq = [...ALL_QUESTIONS].sort((a,b)=>a.id-b.id);
const t3 = Math.ceil(sq.length/3);
sq.forEach((q,i)=>{ q.schwierigkeit = i<t3?'leicht':i<t3*2?'mittel':'schwer'; });

let currentUser = null;
let stats = {richtig:[],falsch:[],gesehen:[]};
let quizQueue = [], quizIdx = 0, quizResults = [];
let selectedDiff = 'alle';

// ════ LOGIN ════
function checkCode(){
  const val = document.getElementById('code-input').value.trim().toUpperCase();
  if(CODES.includes(val)){
    currentUser = val;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.add('visible');
    showHome();
  } else {
    document.getElementById('login-error').textContent = '❌ Ungültiger Code. Bitte prüfen.';
    document.getElementById('code-input').value='';
  }
}
document.getElementById('code-input').addEventListener('keydown',e=>{ if(e.key==='Enter') checkCode(); });

function logout(){
  currentUser=null;
  stats={richtig:[],falsch:[],gesehen:[]};
  document.getElementById('code-input').value='';
  document.getElementById('login-error').textContent='';
  document.getElementById('app-screen').classList.remove('visible');
  document.getElementById('login-screen').classList.remove('hidden');
}

// ════ HOME ════
const DIFFS={
  leicht:{label:'Leicht',emoji:'🟢',farbe:'#3DD68C'},
  mittel:{label:'Mittel',emoji:'🟡',farbe:'#F5C842'},
  schwer:{label:'Schwer',emoji:'🔴',farbe:'#FF5A5A'},
  alle:  {label:'Alle Mix',emoji:'🎲',farbe:'#C9A84C'},
};

function showHome(){
  window.scrollTo(0,0);
  const total=ALL_QUESTIONS.length;
  const beherrscht=stats.richtig.length;
  const falsch=stats.falsch.length;
  const neu=total-stats.gesehen.length;
  const pct=Math.round(beherrscht/total*100);
  const counts={
    leicht:ALL_QUESTIONS.filter(q=>q.schwierigkeit==='leicht').length,
    mittel:ALL_QUESTIONS.filter(q=>q.schwierigkeit==='mittel').length,
    schwer:ALL_QUESTIONS.filter(q=>q.schwierigkeit==='schwer').length,
    alle:total
  };

  document.getElementById('main-content').innerHTML=`
  <div class="anim">
  <div class="stats-row">
    <div class="stat-box"><span class="stat-val" style="color:#C9A84C">${total}</span><span class="stat-lbl">§§</span></div>
    <div class="stat-box"><span class="stat-val" style="color:#3DD68C">${beherrscht}</span><span class="stat-lbl">✓</span></div>
    <div class="stat-box"><span class="stat-val" style="color:#FF5A5A">${falsch}</span><span class="stat-lbl">↺</span></div>
    <div class="stat-box"><span class="stat-val" style="color:#60A5FA">${neu}</span><span class="stat-lbl">○</span></div>
  </div>

  <div class="card">
    <div class="card-label">SCHWIERIGKEITSSTUFE WÄHLEN:</div>
    <div class="diff-grid">
      ${Object.entries(DIFFS).map(([k,v])=>`
        <button class="diff-btn" onclick="selectDiff('${k}')"
          style="border-color:${selectedDiff===k?v.farbe:'rgba(255,255,255,0.08)'};
                 background:${selectedDiff===k?v.farbe+'22':'var(--dark3)'}">
          <span style="font-size:20px">${v.emoji}</span>
          <span class="dlabel">${v.label}</span>
          <small>${counts[k]} Fragen</small>
        </button>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-label">NÄCHSTE RUNDE ENTHÄLT:</div>
    <div class="round-row"><span style="color:#FF5A5A">↺</span><span><b style="color:#FF5A5A">${falsch}</b> Wiederholungen (falsch beantwortet)</span></div>
    <div class="round-row"><span style="color:#60A5FA">★</span><span><b style="color:#60A5FA">${Math.min(neu,20)}</b> neue Fragen</span></div>
    <div class="round-row"><span style="color:#C9A84C">%</span><span>Fortschritt: <b style="color:#C9A84C">${pct}%</b> aller Fragen beherrscht</span></div>
  </div>

  <button class="primary-btn" onclick="startQuiz()">▶ Weiter lernen (${DIFFS[selectedDiff].label})</button>
  <button class="secondary-btn" onclick="showDetail()">📊 Lernstand nach Gesetz</button>
  <button class="danger-btn" onclick="resetProgress()">Fortschritt zurücksetzen</button>
  </div>`;
}

function selectDiff(d){ selectedDiff=d; showHome(); }

function resetProgress(){
  if(confirm('Fortschritt wirklich zurücksetzen?')){
    stats={richtig:[],falsch:[],gesehen:[]};
    showHome();
  }
}

// ════ QUIZ ════
function startQuiz(){
  let pool=selectedDiff==='alle'?ALL_QUESTIONS:ALL_QUESTIONS.filter(q=>q.schwierigkeit===selectedDiff);
  const shuffle=arr=>[...arr].sort(()=>Math.random()-0.5);
  const falschQ=pool.filter(q=>stats.falsch.includes(q.id));
  const neuQ=pool.filter(q=>!stats.gesehen.includes(q.id)&&!stats.falsch.includes(q.id));
  const restQ=pool.filter(q=>stats.gesehen.includes(q.id)&&!stats.falsch.includes(q.id));
  quizQueue=shuffle([...falschQ,...shuffle(neuQ).slice(0,20),...shuffle(restQ)]).slice(0,20);
  if(!quizQueue.length){alert('Alle Fragen beantwortet! Sehr gut!');return;}
  quizIdx=0; quizResults=[];
  showQuestion();
}

function showQuestion(){
  window.scrollTo(0,0);
  const q=quizQueue[quizIdx];
  const pct=Math.round(quizIdx/quizQueue.length*100);
  const letters=['A','B','C'];
  document.getElementById('main-content').innerHTML=`
  <div class="anim">
  <div class="prog-wrap">
    <div class="prog-top"><span>Frage ${quizIdx+1} von ${quizQueue.length}</span><span>${pct}%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:${pct}%"></div></div>
  </div>
  <div class="q-tag">${q.gesetz}</div>
  <div class="q-text">${q.frage}</div>
  <div class="answers" id="answers">
    ${q.antworten.map((a,i)=>`
      <button class="ans-btn" id="ans${i}" onclick="selectAnswer(${i})">
        <span class="letter">${letters[i]}</span><span>${a.replace(/^#\d{4}\s*/,'')}</span>
      </button>`).join('')}
  </div>
  <div class="feedback" id="feedback"></div>
  <button class="primary-btn" id="next-btn" style="display:none" onclick="nextQuestion()">
    ${quizIdx+1>=quizQueue.length?'Ergebnis anzeigen →':'Nächste Frage →'}
  </button>
  <button class="secondary-btn" style="margin-top:4px" onclick="showHome()">← Abbrechen</button>
  </div>`;
}

function selectAnswer(idx){
  const q=quizQueue[quizIdx];
  document.querySelectorAll('.ans-btn').forEach(b=>b.classList.add('locked'));
  const isOk=idx===q.richtig;
  quizResults.push({id:q.id,correct:isOk});
  document.getElementById('ans'+idx).classList.add(isOk?'correct':'wrong');
  if(!isOk) document.getElementById('ans'+q.richtig).classList.add('correct');
  document.querySelectorAll('.ans-btn').forEach((b,i)=>{
    if(i!==idx&&i!==q.richtig) b.style.opacity='0.3';
  });
  const fb=document.getElementById('feedback');
  fb.className='feedback show '+(isOk?'ok':'err');
  fb.innerHTML=`<b>${isOk?'✓ Richtig!':'✗ Leider falsch.'}</b>${q.erklaerung}`;
  document.getElementById('next-btn').style.display='block';
}

function nextQuestion(){
  const last=quizResults[quizResults.length-1];
  if(last){
    if(!stats.gesehen.includes(last.id)) stats.gesehen.push(last.id);
    if(last.correct){
      stats.richtig=[...new Set([...stats.richtig,last.id])];
      stats.falsch=stats.falsch.filter(id=>id!==last.id);
    }else{
      stats.falsch=[...new Set([...stats.falsch,last.id])];
      stats.richtig=stats.richtig.filter(id=>id!==last.id);
    }
  }
  quizIdx++;
  if(quizIdx>=quizQueue.length) showResult();
  else showQuestion();
}

// ════ RESULT ════
function showResult(){
  window.scrollTo(0,0);
  const correct=quizResults.filter(r=>r.correct).length;
  const pct=Math.round(correct/quizResults.length*100);
  const icon=pct>=70?'🏆':pct>=50?'📚':'💪';
  const title=pct>=70?'Sehr gut!':pct>=50?'Weiter üben!':'Nicht aufgeben!';
  document.getElementById('main-content').innerHTML=`
  <div class="result-screen anim">
    <div style="font-size:64px;margin-bottom:16px">${icon}</div>
    <div style="font-size:28px;font-weight:700;color:var(--gold);margin-bottom:8px">${title}</div>
    <div style="color:var(--muted);font-size:14px;margin-bottom:20px">Dein Ergebnis</div>
    <div class="score-big">${pct}%</div>
    <div style="color:var(--muted);font-size:14px;margin-bottom:32px">${correct} von ${quizResults.length} Fragen richtig</div>
    <button class="primary-btn" onclick="showHome()">Zurück zum Menü</button>
  </div>`;
}

// ════ DETAIL ════
function showDetail(){
  window.scrollTo(0,0);
  const gesetze=[...new Set(ALL_QUESTIONS.map(q=>q.gesetz))].sort();
  document.getElementById('main-content').innerHTML=`
  <div class="anim">
  <button class="secondary-btn" onclick="showHome()">← Zurück</button>
  <div style="font-size:18px;font-weight:700;margin-bottom:16px">📊 Lernstand nach Gesetz</div>
  ${gesetze.map(g=>{
    const qs=ALL_QUESTIONS.filter(q=>q.gesetz===g);
    const r=qs.filter(q=>stats.richtig.includes(q.id)).length;
    const pct=Math.round(r/qs.length*100);
    return `<div class="detail-item">
      <div style="font-weight:600;font-size:14px">${g}</div>
      <div class="detail-bar"><div class="detail-fill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:var(--muted)">${r} / ${qs.length} · ${pct}%</div>
    </div>`;
  }).join('')}
  </div>`;
}
</script>
</body>
</html>
